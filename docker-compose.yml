version: '3.8'

services:
  # ============================================
  # Next.js Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stem-story-generator
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # Application Environment
      - NODE_ENV=production

      # LLM API Configuration (OpenAI Compatible)
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_ENDPOINT=${LLM_ENDPOINT:-https://api.openai.com/v1/chat/completions}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}

      # Alibaba Cloud RDS Configuration (MySQL)
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-stem_stories}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_SSL=${MYSQL_SSL:-true}

      # Database Connection Pool (Optional)
      - DB_POOL_MIN=${DB_POOL_MIN:-2}
      - DB_POOL_MAX=${DB_POOL_MAX:-10}

      # Application Config
      - APP_NAME=${APP_NAME:-STEM Story Generator}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # Rate Limiting
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-10}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-86400}

      # Feature Flags
      - ENABLE_CACHE=${ENABLE_CACHE:-true}
      - CACHE_TTL=${CACHE_TTL:-86400}

    networks:
      - stem-network

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  stem-network:
    driver: bridge

# ============================================
# Usage Instructions
# ============================================
# 1. Create a .env file with your configuration:
#    cp .env.example .env
#
# 2. For Alibaba Cloud RDS, set these variables:
#    MYSQL_HOST=your-rds-endpoint.rds.aliyuncs.com
#    MYSQL_PORT=3306
#    MYSQL_DATABASE=stem_stories
#    MYSQL_USER=your_db_user
#    MYSQL_PASSWORD=your_db_password
#    MYSQL_SSL=true
#
# 3. For LLM API (OpenAI or compatible):
#    LLM_API_KEY=sk-your-api-key
#    LLM_ENDPOINT=https://api.openai.com/v1/chat/completions
#    LLM_MODEL=gpt-4o-mini
#
# 4. Build and run:
#    docker-compose up -d --build
#
# 5. View logs:
#    docker-compose logs -f app
#
# 6. Stop services:
#    docker-compose down
